  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2B3870; --navy-dk: #1a2250;
      --green: #4A7A2E; --green-lt: #6aae40;
      --cream: #F5F3EE; --cream-dk: #E8E4DA;
      --text: #1C2035; --muted: #6B7080;
      --white: #FDFCF9;
      --r: clamp(12px,2vw,20px);
      --px: clamp(16px,5vw,120px);
      --hero-pt: clamp(90px,10vh,160px);
    }
    /* Cache le badge reCAPTCHA (on mentionne la protection dans les CGU) */
    .grecaptcha-badge { visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }

    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

    /* ── Anti-sélection / anti-drag ── */
    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
    }
    /* Autoriser la sélection dans les champs de saisie */
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }
    img { pointer-events: none; -webkit-user-drag: none; }
    h1,h2,h3 { font-family: 'Lora', serif; }
    ::selection { background: var(--green); color: #fff; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--cream-dk); }
    ::-webkit-scrollbar-thumb { background: var(--navy); border-radius: 3px; }

    /* ── animations ── */
    @keyframes floatBlob { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-14px) scale(1.04)} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    @keyframes modalIn   { from{opacity:0;transform:perspective(800px) translateY(40px) rotateX(6deg) scale(.96)} to{opacity:1;transform:perspective(800px) translateY(0) rotateX(0deg) scale(1)} }
    @keyframes ripple    { to{transform:scale(4);opacity:0} }
    @keyframes pressIn   { to{transform:scale(.96)} }
    @keyframes slideIn   { from{opacity:0;transform:translateY(22px) rotateX(4deg)} to{opacity:1;transform:translateY(0) rotateX(0)} }

    /* ── scroll reveal 3D ── */
    .scene3d { perspective: 1000px; perspective-origin: 50% 40%; }
    .reveal {
      opacity: 0;
      transform: perspective(900px) translateY(60px) rotateX(22deg) scale(0.93);
      transition: opacity .7s cubic-bezier(0.22,1,.36,1), transform .7s cubic-bezier(0.22,1,.36,1);
      transform-origin: 50% 100%;
      will-change: transform, opacity;
    }
    .reveal.visible { opacity: 1; transform: perspective(900px) translateY(0) rotateX(0) scale(1); }
    .reveal-left {
      opacity: 0;
      transform: perspective(900px) translateX(-60px) rotateY(18deg);
      transition: opacity .7s cubic-bezier(0.22,1,.36,1), transform .7s cubic-bezier(0.22,1,.36,1);
      transform-origin: 100% 50%;
      will-change: transform, opacity;
    }
    .reveal-left.visible { opacity: 1; transform: perspective(900px) translateX(0) rotateY(0); }
    .reveal-right {
      opacity: 0;
      transform: perspective(900px) translateX(60px) rotateY(-18deg);
      transition: opacity .7s cubic-bezier(0.22,1,.36,1), transform .7s cubic-bezier(0.22,1,.36,1);
      transform-origin: 0% 50%;
      will-change: transform, opacity;
    }
    .reveal-right.visible { opacity: 1; transform: perspective(900px) translateX(0) rotateY(0); }
    /* continuous scroll tilt on cards */
    .scroll-tilt { will-change: transform; transition: transform .05s linear; }

    /* ── nav hamburger ── */
    .nav-links { display: flex; align-items: center; gap: clamp(14px,2vw,32px); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--navy); border-radius: 2px; margin: 5px 0; transition: all .3s; }
    .mobile-menu { display: none; }

    /* ── responsive breakpoints ── */

    /* Tablets (768–1024px) */
    @media (max-width: 1024px) {
      .why-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
      .why-cards { grid-template-columns: 1fr 1fr; }
    }

    /* Mobile (≤ 768px) */
    @media (max-width: 768px) {
      .nav-links { display: none !important; }
      .hamburger { display: block !important; }
      .mobile-menu.open { display: flex; flex-direction: column; position: fixed; top: 70px; left: 0; right: 0; background: rgba(245,243,238,0.98); backdrop-filter: blur(16px); padding: 20px 24px 28px; gap: 18px; border-bottom: 1px solid rgba(43,56,112,0.08); z-index: 190; animation: fadeUp .2s ease; }
      .mobile-menu a, .mobile-menu button { width: 100%; text-align: left; }
      .hero-btns { flex-direction: column !important; align-items: stretch !important; }
      .hero-btns a, .hero-btns button { text-align: center !important; }
      .stats-row { gap: 14px !important; }
      .steps-grid { grid-template-columns: 1fr !important; }
      .why-cards { grid-template-columns: 1fr !important; }
      .modal-inner { padding: 24px 20px !important; border-radius: 16px !important; }
      .composer-inner { padding: 24px 20px !important; }
    }

    /* Small phones (≤ 480px) */
    @media (max-width: 480px) {
      .stats-row { flex-direction: column !important; align-items: center !important; }
      .step-card { padding: 24px 20px !important; }
    }

    /* Large / 4K / 8K */
    @media (min-width: 2560px) {
      html { font-size: 20px; }
      :root { --px: 200px; }
    }
    @media (min-width: 3840px) {
      html { font-size: 28px; }
      :root { --px: 320px; }
    }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const C = {
  navy:'#2B3870', navyDk:'#1a2250',
  green:'#4A7A2E', greenLt:'#6aae40',
  cream:'#F5F3EE', creamDk:'#E8E4DA',
  text:'#1C2035', muted:'#6B7080', white:'#FDFCF9'

/* ── Scroll reveal + continuous 3D ─── */
const useReveal = () => {
  useEffect(() => {
    // Entrance reveal for all 3 directions
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => obs.observe(el));

    // Continuous scroll-driven tilt on .scroll-tilt cards
    let raf;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const midY = window.innerHeight / 2;
        document.querySelectorAll('.scroll-tilt').forEach(el => {
          if (el.dataset.hovered) return; // don't fight hover
          const rect = el.getBoundingClientRect();
          const elMid = rect.top + rect.height / 2;
          const dist = (elMid - midY) / midY; // -1..1
          const rotX = dist * 10;
          const scale = 1 - Math.abs(dist) * 0.04;
          if (rect.top < window.innerHeight + 100 && rect.bottom > -100) {
            el.style.transform = `perspective(700px) rotateX(${rotX}deg) scale(${scale})`;
          }
        });

        // Parallax depth layers
        document.querySelectorAll('[data-parallax]').forEach(el => {
          const speed = parseFloat(el.dataset.parallax) || 0.15;
          const rect = el.parentElement.getBoundingClientRect();
          const offset = (window.innerHeight / 2 - (rect.top + rect.height / 2)) * speed;
          el.style.transform = `translateY(${offset}px)`;
        });
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => { obs.disconnect(); window.removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
  }, []);
};

/* ── Animated Button ────────────────── */
const AnimBtn = ({ children, onClick, style={}, variant='green', href, tag='button', ...rest }) => {
  const ref = useRef();
  const bg = variant === 'green'
    ? `linear-gradient(135deg, ${C.green}, ${C.greenLt})`
    : variant === 'navy' ? C.navy
    : variant === 'ghost' ? 'rgba(255,255,255,0.55)' : C.navy;
  const shadow = variant === 'green' ? '0 6px 22px rgba(74,122,46,0.32)'
    : variant === 'navy' ? '0 6px 22px rgba(43,56,112,0.22)'
    : '0 2px 10px rgba(43,56,112,0.08)';

  const doRipple = e => {
    const btn = ref.current; if (!btn) return;
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const ripple = document.createElement('span');
    Object.assign(ripple.style, {
      position:'absolute', borderRadius:'50%', pointerEvents:'none',
      width:'8px', height:'8px', left:`${x-4}px`, top:`${y-4}px`,
      background:'rgba(255,255,255,0.45)', animation:'ripple .55s ease-out forwards'
    });
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 560);
  };

  const baseStyle = {
    position:'relative', overflow:'hidden', cursor:'pointer', border:'none',
    borderRadius:'clamp(8px,1vw,12px)', padding:'clamp(11px,1.2vw,16px) clamp(18px,2.5vw,34px)',
    fontSize:'clamp(13px,1.1vw,16px)', fontWeight:700, fontFamily:'Inter,sans-serif',
    background: bg, color: variant==='ghost' ? C.navy : 'white',
    border: variant==='ghost' ? `1.5px solid rgba(43,56,112,0.2)` : 'none',
    backdropFilter: variant==='ghost' ? 'blur(12px)' : 'none',
    boxShadow: shadow,
    transition: 'transform .18s cubic-bezier(0.34,1.56,0.64,1), box-shadow .18s ease, opacity .15s',
    display:'inline-block', textDecoration:'none', textAlign:'center',
    ...style
  };

  const hoverOn = e => {
    e.currentTarget.style.transform = 'translateY(-3px) scale(1.03)';
    e.currentTarget.style.boxShadow = variant==='green' ? '0 12px 32px rgba(74,122,46,0.42)'
      : variant==='navy' ? '0 12px 28px rgba(43,56,112,0.32)' : '0 6px 18px rgba(43,56,112,0.14)';
  };
  const hoverOff = e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=shadow; };
  const pressOn  = e => { e.currentTarget.style.transform='scale(0.96) translateY(1px)'; };
  const pressOff = e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=shadow; };

  const props = {
    ref, style:baseStyle,
    onMouseEnter:hoverOn, onMouseLeave:hoverOff,
    onMouseDown:pressOn, onMouseUp:hoverOn,
    onClick: e => { doRipple(e); onClick && onClick(e); },
    ...rest
  };

  if (href) return <a href={href} {...props}>{children}</a>;
  return <button {...props}>{children}</button>;
};

/* ── Nav ────────────────────────────── */
const Nav = ({ onCTA }) => {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <>
      <nav style={{
        position:'fixed',top:0,left:0,right:0,zIndex:200,
        background: scrolled ? 'rgba(245,243,238,0.96)' : 'transparent',
        backdropFilter: scrolled ? 'blur(18px)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(43,56,112,0.07)' : 'none',
        transition:'all .3s',padding:'0 var(--px)',height:'clamp(60px,8vh,80px)',
        display:'flex',alignItems:'center',justifyContent:'space-between'
      }}>
        <Logo height={40}/>
        <div className="nav-links">
          <a href="#comment" style={{color:C.navy,fontWeight:500,fontSize:'clamp(13px,1vw,15px)',textDecoration:'none',opacity:.75,transition:'opacity .2s'}}
            onMouseOver={e=>e.target.style.opacity=1} onMouseOut={e=>e.target.style.opacity=.75}>
            Comment ça marche
          </a>
          <a href="#pourquoi" style={{color:C.navy,fontWeight:500,fontSize:'clamp(13px,1vw,15px)',textDecoration:'none',opacity:.75,transition:'opacity .2s'}}
            onMouseOver={e=>e.target.style.opacity=1} onMouseOut={e=>e.target.style.opacity=.75}>
            Pourquoi Myrtine
          </a>
          <AnimBtn variant="navy" onClick={onCTA} style={{padding:'10px 20px',fontSize:'clamp(12px,0.9vw,14px)'}}>
            Obtenir des financements
          </AnimBtn>
        </div>
        <button className="hamburger" onClick={()=>setMenuOpen(o=>!o)} aria-label="Menu">
          <span style={{transform:menuOpen?'rotate(45deg) translate(5px,5px)':''}}/>
          <span style={{opacity:menuOpen?0:1}}/>
          <span style={{transform:menuOpen?'rotate(-45deg) translate(5px,-5px)':''}}/>
        </button>
      </nav>
      <div className={`mobile-menu ${menuOpen?'open':''}`}>
        <a href="#comment" onClick={()=>setMenuOpen(false)} style={{color:C.navy,fontWeight:500,fontSize:16,textDecoration:'none'}}>Comment ça marche</a>
        <a href="#pourquoi" onClick={()=>setMenuOpen(false)} style={{color:C.navy,fontWeight:500,fontSize:16,textDecoration:'none'}}>Pourquoi Myrtine</a>
        <AnimBtn variant="green" onClick={()=>{setMenuOpen(false);onCTA();}} style={{width:'100%',textAlign:'center',padding:'13px 20px'}}>
          Obtenir des financements publics →
        </AnimBtn>
      </div>
    </>
  );
};

/* ── Hero ───────────────────────────── */
const Hero = ({ onCTA }) => {
  const sceneRef = useRef();
  useEffect(() => {
    let raf;
    const fn = e => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        if (!sceneRef.current) return;
        const cx = window.innerWidth/2, cy = window.innerHeight/2;
        const dx = (e.clientX-cx)/cx * 5;
        const dy = (e.clientY-cy)/cy * 3;
        sceneRef.current.style.transform = `perspective(1200px) rotateY(${dx}deg) rotateX(${-dy}deg)`;
      });
    };
    window.addEventListener('mousemove', fn, {passive:true});
    return () => { window.removeEventListener('mousemove', fn); cancelAnimationFrame(raf); };
  }, []);

  return (
    <section style={{
      minHeight:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      padding:'var(--hero-pt) var(--px) clamp(60px,8vh,100px)',
      background:'radial-gradient(ellipse at 65% 35%, oklch(0.93 0.04 145) 0%, var(--cream) 50%, oklch(0.91 0.03 258) 100%)',
      textAlign:'center',position:'relative',overflow:'hidden'
    }}>
      {/* soft blobs with parallax */}
      {[{w:500,h:500,top:-100,right:-80,bg:'oklch(0.91 0.05 145)',op:0.2,dur:'6s',speed:0.12},
        {w:360,h:360,bottom:-60,left:-50,bg:'oklch(0.88 0.04 260)',op:0.15,dur:'8s',speed:0.22}].map((b,i)=>(
        <div key={i} data-parallax={b.speed} style={{
          position:'absolute',width:b.w,height:b.h,borderRadius:'50%',
          top:b.top,right:b.right,bottom:b.bottom,left:b.left,
          background:b.bg,opacity:b.op,filter:'blur(80px)',
          animation:`floatBlob ${b.dur} ease-in-out infinite`,pointerEvents:'none',willChange:'transform'
        }}/>
      ))}

/* ── Form helpers ───────────────────── */
const iStyle = {
  width:'100%',padding:'clamp(9px,1vh,12px) clamp(11px,1.5vw,15px)',
  borderRadius:'clamp(7px,0.8vw,10px)',border:'1.5px solid rgba(43,56,112,0.13)',
  fontSize:'clamp(13px,1vw,15px)',color:C.text,fontFamily:'Inter,sans-serif',
  outline:'none',background:'white',transition:'border-color .2s, box-shadow .2s',display:'block'
};

const SelectOther = ({ field, val, onChange }) => {
  const isCustom = val && !field.options.includes(val);
  const [showCustom, setShowCustom] = useState(isCustom);
  const [custom, setCustom] = useState(isCustom ? val : '');
  const pick = opt => {
    if (opt==='Autre') { setShowCustom(true); onChange(''); }
    else { setShowCustom(false); setCustom(''); onChange(opt); }
  };
  const upd = v => { setCustom(v); onChange(v); };
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'clamp(5px,0.6vh,8px)'}}>
      {field.options.map(opt=>(
        <button key={opt} onClick={()=>pick(opt)} type="button" style={{
          textAlign:'left',padding:'clamp(8px,1vh,11px) clamp(11px,1.2vw,15px)',
          borderRadius:'clamp(7px,0.8vw,10px)',cursor:'pointer',
          border:`1.5px solid ${(val===opt||(opt==='Autre'&&showCustom))?C.green:'rgba(43,56,112,0.11)'}`,
          background:(val===opt||(opt==='Autre'&&showCustom))?'rgba(74,122,46,0.07)':'transparent',
          fontSize:'clamp(12px,1vw,14px)',color:C.text,fontFamily:'Inter,sans-serif',
          transition:'all .15s',display:'flex',alignItems:'center',gap:8
        }}>
          <span style={{color:(val===opt||(opt==='Autre'&&showCustom))?C.green:'transparent',fontSize:11}}>✓</span>{opt}
        </button>
      ))}
      {showCustom && <input value={custom} onChange={e=>upd(e.target.value)} placeholder="Précisez…" autoFocus style={{...iStyle,marginTop:4,borderColor:C.green}}/>}
    </div>
  );
};

const CheckboxesOther = ({ field, val=[], onChange }) => {
  const stdOpts = field.options.filter(o=>o!=='Autre');
  const hasCustom = val.some(v=>!field.options.includes(v));
  const customText = hasCustom ? val.find(v=>!field.options.includes(v)) : '';
  const [showOther, setShowOther] = useState(hasCustom||val.includes('Autre'));
  const [otherVal, setOtherVal] = useState(customText||'');

  const stdVals = val.filter(v=>stdOpts.includes(v));
  const toggle = opt => {
    if (opt==='Autre') {
      const next = !showOther; setShowOther(next);
      if (!next) { onChange(stdVals); setOtherVal(''); }
    } else {
      const next = stdVals.includes(opt) ? stdVals.filter(v=>v!==opt) : [...stdVals,opt];
      onChange(showOther && otherVal ? [...next,otherVal] : next);
    }
  };
  const updOther = v => { setOtherVal(v); onChange(v ? [...stdVals,v] : stdVals); };
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'clamp(5px,0.6vh,8px)'}}>
      {field.options.map(opt=>{
        const checked = opt==='Autre' ? showOther : stdVals.includes(opt);
        return (
          <button key={opt} onClick={()=>toggle(opt)} type="button" style={{
            textAlign:'left',padding:'clamp(8px,1vh,11px) clamp(11px,1.2vw,15px)',
            borderRadius:'clamp(7px,0.8vw,10px)',cursor:'pointer',
            border:`1.5px solid ${checked?C.green:'rgba(43,56,112,0.11)'}`,
            background:checked?'rgba(74,122,46,0.07)':'transparent',
            fontSize:'clamp(12px,1vw,14px)',color:C.text,fontFamily:'Inter,sans-serif',
            transition:'all .15s',display:'flex',alignItems:'center',gap:10
          }}>
            <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`2px solid ${checked?C.green:'#CBD0E0'}`,background:checked?C.green:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {checked&&<svg width="8" height="6" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            {opt}
          </button>
        );
      })}
      {showOther&&<input value={otherVal} onChange={e=>updOther(e.target.value)} placeholder="Précisez votre besoin…" autoFocus style={{...iStyle,marginTop:4,borderColor:C.green}}/>}
    </div>
  );
};

/* ── Questions ──────────────────────── */
const QUESTIONS = [
  {id:'entreprise',label:'Votre entreprise',fields:[
    {id:'nom_entreprise',label:"Nom de l'entreprise",type:'text',placeholder:'Ex : La Belle Maison SARL',required:true},
    {id:'statut',label:'Statut juridique',type:'select',required:true,options:['En cours de création','Auto-entrepreneur / Micro-entreprise','SASU / SAS','EURL / SARL','SA','Association','Autre']},
  ]},
  {id:'activite',label:'Votre activité',fields:[
    {id:'domaine',label:"Domaine d'activité",type:'select',required:true,options:['Alimentation / Gastronomie','Artisanat / Savoir-faire','Textile / Mode','Cosmétique / Beauté','Agriculture / Viticulture','Industrie / Manufacture','Tech / Innovation','Décoration / Design','Bien-être / Santé','Autre']},
    {id:'description',label:'Décrivez brièvement vos produits Made in France',type:'textarea',required:true,placeholder:'Ex : Bougies artisanales fabriquées à Grasse avec des matières premières 100 % françaises…'},
  ]},
  {id:'situation',label:'Votre situation',fields:[
    {id:'stade',label:'Stade du projet',type:'select',required:true,options:['Idée / Pré-création','Création récente (< 1 an)','Démarrage (1–3 ans)','Développement (3–5 ans)','Croissance (> 5 ans)']},
    {id:'effectif',label:'Effectif (nombre de personnes)',type:'number',required:true,placeholder:'Ex : 3',min:1},
    {id:'region',label:'Région',type:'select',required:true,options:["Île-de-France","Auvergne-Rhône-Alpes","Bourgogne-Franche-Comté","Bretagne","Centre-Val de Loire","Corse","Grand Est","Hauts-de-France","Normandie","Nouvelle-Aquitaine","Occitanie","Pays de la Loire","Provence-Alpes-Côte d'Azur","DOM-TOM / Outre-mer"]},
  ]},
  {id:'financement',label:'Vos besoins',fields:[
    {id:'besoins',label:'Quels sont vos besoins ?',type:'checkboxes',required:true,options:['Investissement matériel / équipement','Recrutement & formation','Recherche & développement','Export / internationalisation','Transition écologique / RSE','Numérisation / digital','Trésorerie','Communication & marketing','Autre']},
    {id:'montant',label:'Montant recherché',type:'select',required:true,options:['< 5 000 €','5 000 – 20 000 €','20 000 – 50 000 €','50 000 – 200 000 €','200 000 – 1 000 000 €','> 1 000 000 €']},
  ]},
  {id:'contact',label:'Vos coordonnées',fields:[
    {id:'contact_nom',label:'Votre nom complet',type:'text',placeholder:'Prénom Nom',required:true},
    {id:'contact_email',label:'Votre adresse email',type:'email',placeholder:'vous@exemple.fr',required:true},
  ]},
];

const StepForm = ({ step, answers, setAnswers, onNext, onPrev, isLast }) => {
  const q = QUESTIONS[step];
  const [errors, setErrors] = useState({});
  const get = id => answers[id] ?? (q.fields.find(f=>f.id===id)?.type==='checkboxes'?[]:'');
  const set = (id,v) => { setAnswers(a=>({...a,[id]:v})); setErrors(e=>({...e,[id]:''})); };
  const validate = () => {
    const errs = {};
    q.fields.forEach(f=>{
      if(!f.required) return;
      const v = get(f.id);
      if(f.type==='checkboxes'&&(!v||v.length===0)) errs[f.id]='Sélectionnez au moins une option.';
      else if(!v||String(v).trim()==='') errs[f.id]='Ce champ est requis.';
    });
    setErrors(errs);
    return Object.keys(errs).length===0;
  };
  return (
    <div style={{animation:'slideIn .3s ease'}}>
      <h3 style={{fontSize:'clamp(15px,1.5vw,19px)',color:C.navy,marginBottom:'clamp(16px,2vh,24px)',fontFamily:'Lora,serif',display:'flex',alignItems:'center',gap:10}}>
        <span style={{width:28,height:28,borderRadius:'50%',background:C.green,color:'white',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0}}>{step+1}</span>
        {q.label}
      </h3>
      <div style={{display:'flex',flexDirection:'column',gap:'clamp(14px,1.8vh,22px)'}}>
        {q.fields.map(f=>(
          <div key={f.id}>
            <label style={{display:'block',fontSize:'clamp(11px,0.9vw,13px)',fontWeight:600,color:C.navy,marginBottom:7}}>
              {f.label}{f.required&&<span style={{color:C.green,marginLeft:3}}>*</span>}
            </label>
            {f.type==='text'&&<input value={get(f.id)} onChange={e=>set(f.id,e.target.value)} placeholder={f.placeholder} style={{...iStyle,borderColor:errors[f.id]?'#e05252':undefined}} onKeyDown={e=>e.key==='Enter'&&validate()&&onNext()}/>}
            {f.type==='email'&&<input type="email" value={get(f.id)} onChange={e=>set(f.id,e.target.value)} placeholder={f.placeholder} style={{...iStyle,borderColor:errors[f.id]?'#e05252':undefined}} onKeyDown={e=>e.key==='Enter'&&validate()&&onNext()}/>}
            {f.type==='number'&&<input type="number" value={get(f.id)} onChange={e=>set(f.id,e.target.value)} placeholder={f.placeholder} min={f.min||1} style={{...iStyle,borderColor:errors[f.id]?'#e05252':undefined,maxWidth:180}}/>}
            {f.type==='textarea'&&<textarea value={get(f.id)} onChange={e=>set(f.id,e.target.value)} placeholder={f.placeholder} rows={3} style={{...iStyle,resize:'vertical'}}/>}
            {f.type==='select'&&<SelectOther field={f} val={get(f.id)} onChange={v=>set(f.id,v)}/>}
            {f.type==='checkboxes'&&<CheckboxesOther field={f} val={get(f.id)} onChange={v=>set(f.id,v)}/>}
            {errors[f.id]&&<p style={{color:'#e05252',fontSize:12,marginTop:5}}>{errors[f.id]}</p>}
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:'clamp(20px,2.5vh,30px)'}}>

/* ── Loading timer ──────────────────── */
const LoadingTimer = () => {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setSecs(s => s+1), 1000);
    return () => clearInterval(id);
  }, []);
  const pct = Math.min(100, Math.round((secs/100)*100));
  return (
    <div style={{marginTop:20,maxWidth:280,margin:'20px auto 0'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:'clamp(10px,0.85vw,12px)',color:C.muted}}>
        <span>Tentative en cours…</span>
        <span style={{fontWeight:600,color:secs>60?'#c0392b':C.navy}}>{secs}s / 100s max</span>
      </div>
      <div style={{height:5,background:C.creamDk,borderRadius:5,overflow:'hidden'}}>
        <div style={{
          height:'100%',borderRadius:5,
          background:`linear-gradient(90deg,${C.green},${C.greenLt})`,
          width:`${pct}%`,transition:'width 1s linear'
        }}/>
      </div>
      {secs > 15 && secs <= 60 && (
        <p style={{fontSize:'clamp(10px,0.8vw,11px)',color:C.muted,marginTop:8,textAlign:'center'}}>
          Le serveur est en train de démarrer, encore un peu de patience…
        </p>
      )}
      {secs > 60 && (
        <p style={{fontSize:'clamp(10px,0.8vw,11px)',color:'#c0392b',marginTop:8,textAlign:'center'}}>
          Le démarrage est plus long que prévu, merci de continuer à patienter…
        </p>
      )}
    </div>
  );
};

/* ── Email Composer ─────────────────── */
const EmailComposer = ({ answers, onClose, onBack }) => {
  const A = answers;
  const besoins = Array.isArray(A.besoins) ? A.besoins.join(', ') : A.besoins||'';
  const defaultBody = `Bonjour,

Je souhaite obtenir de l'aide pour identifier les financements publics adaptés à mon entreprise. Voici mes informations :

─────────────────────────────
ENTREPRISE
─────────────────────────────
Nom : ${A.nom_entreprise||''}
Statut : ${A.statut||''}
Région : ${A.region||''}
Effectif : ${A.effectif||''} personne(s)

─────────────────────────────
ACTIVITÉ
─────────────────────────────
Domaine : ${A.domaine||''}
Description : ${A.description||''}
Stade du projet : ${A.stade||''}

─────────────────────────────
BESOINS DE FINANCEMENT
─────────────────────────────
Types de besoins : ${besoins}
Montant recherché : ${A.montant||''}

─────────────────────────────
CONTACT
─────────────────────────────
Nom : ${A.contact_nom||''}
Email : ${A.contact_email||''}

Dans l'attente de votre retour, cordialement,
${A.contact_nom||''}`;

  const [body, setBody] = useState(defaultBody);
  const [status, setStatus] = useState(null);
  const [errorMsg, setErrorMsg] = useState('');
  const [showConfirm, setShowConfirm] = useState(false);

  // Valide l'email côté client avant d'envoyer
  const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(e).trim());

  const verifyWithServer = async (email, captchaToken) => {
    const safeEmail = String(email || '').trim().slice(0, 320);
    if (!isValidEmail(safeEmail)) {
      setStatus('error');
      setErrorMsg("L'adresse email fournie est invalide.");
      return;
    }

    // Polling robuste : retente toutes les 8s pendant 100s max (Render cold start x2)
    const MAX_WAIT = 100000;
    const RETRY_INTERVAL = 8000;
    const started = Date.now();

    const tryFetch = async (attempt=1) => {
      const elapsed = Date.now() - started;
      if (elapsed >= MAX_WAIT) {
        setStatus('error');
        setErrorMsg('Le serveur ne répond pas après 1 minute 40. Il est peut-être temporairement indisponible. Veuillez réessayer plus tard.');
        return;
      }

      const remaining = MAX_WAIT - elapsed;
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), Math.min(RETRY_INTERVAL - 500, remaining));

      try {
        const reponse = await fetch(
          'https://myrtine-serveur.onrender.com/email-verification',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: safeEmail, captcha: captchaToken || '' }),
            signal: controller.signal
          }
        );
        clearTimeout(tid);

        // Serveur en démarrage (502/503/504) → retry
        if (reponse.status === 502 || reponse.status === 503 || reponse.status === 504) {
          await new Promise(r => setTimeout(r, RETRY_INTERVAL));
          return tryFetch(attempt + 1);
        }

        const contentType = reponse.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          const raw = (await reponse.text()).trim().slice(0, 200);
          // Réponse HTML ou vide = serveur en cours de démarrage → retry
          if (raw === '' || raw.startsWith('<!') || reponse.status >= 500) {
            await new Promise(r => setTimeout(r, RETRY_INTERVAL));
            return tryFetch(attempt + 1);
          }
          setStatus('error');
          setErrorMsg(`Réponse inattendue du serveur (statut ${reponse.status}). Veuillez réessayer.`);
          return;
        }

        const data = await reponse.json();
        if (data && (String(data.reponse).toLowerCase() === 'bot' || data.bot === true)) {
          setStatus('bot'); return;
        }
        if (data && String(data.reponse).toLowerCase() === 'vrai') {
          setStatus('recu');
        } else {
          const msg = data?.erreur || data?.message || data?.error || JSON.stringify(data);
          setStatus('error');
          setErrorMsg(msg);
        }
      } catch (err) {
        clearTimeout(tid);
        const isAbort = err?.name === 'AbortError';
        const isNetwork = err?.name === 'TypeError' || err?.message === 'Failed to fetch';
        // Erreur réseau ou timeout partiel → retry si on a encore du temps
        if (isAbort || isNetwork) {
          if (Date.now() - started < MAX_WAIT - RETRY_INTERVAL) {
            await new Promise(r => setTimeout(r, RETRY_INTERVAL));
            return tryFetch(attempt + 1);
          }
          setStatus('error');
          setErrorMsg('Impossible de contacter le serveur après plusieurs tentatives. Vérifiez votre connexion internet.');
          return;
        }
        setStatus('error');
        setErrorMsg(err?.message || 'Erreur inconnue.');
      }
    };

    await tryFetch();
  };

  const handleSend = () => {
    // Vérification email avant tout
    const emailVal = String(A.contact_email || '').trim();
    if (!isValidEmail(emailVal)) {
      setStatus('error');
      setErrorMsg("Veuillez renseigner une adresse email valide dans le questionnaire.");
      return;
    }
    // reCAPTCHA v3 — obtenir le token, puis vérifier côté serveur
    const executeAndSend = () => {
      if (window.grecaptcha) {
        window.grecaptcha.ready(() => {
          window.grecaptcha
            .execute('6Lc87tMsAAAAAJe1EKh33ctEM2BX0_AVDyRwxOtB', { action: 'send_email' })
            .then(token => doSend(token))
            .catch(() => {
              setStatus('error');
              setErrorMsg('Le CAPTCHA n\'a pas pu s\'initialiser. Veuillez recharger la page.');
            });
        });
      } else {
        setStatus('error');
        setErrorMsg('Le CAPTCHA n\'est pas chargé. Vérifiez votre connexion internet et rechargez la page.');
      }
    };
    executeAndSend();
  };

  const doSend = (captchaToken) => {
    const bodyTruncated = body.length > 8000 ? body.slice(0, 8000) + '\n...[tronqué]' : body;
    const mailto = `mailto:contact.myrtine@gmail.com?subject=${encodeURIComponent('Recherche de financements publiques')}&body=${encodeURIComponent(bodyTruncated)}`;
    try { window.open(mailto, '_blank'); } catch(e) { window.location.href = mailto; }
    setStatus('loading');
    verifyWithServer(A.contact_email, captchaToken);
  };

  // Status screens
  if (status==='loading') return (
    <div className="composer-inner" style={{padding:'clamp(32px,5vh,52px) clamp(20px,4vw,44px)',textAlign:'center'}}>

        </span>

  );
  if (status==='bot') return (

  if (status==='recu') return (

        <AnimBtn variant="ghost" onClick={onClose} style={{color:C.navy}}>Fermer</AnimBtn>

  const [step, setStep] = useState(0);
  const [showEmail, setShowEmail] = useState(false);
  const total = QUESTIONS.length;
  const progress = ((step+1)/total)*100;

  useEffect(()=>{ document.body.style.overflow='hidden'; return()=>{ document.body.style.overflow=''; }; },[]);

  return (
    <div style={{
      position:'fixed',inset:0,zIndex:300,
      background:'rgba(14,18,42,0.7)',backdropFilter:'blur(5px)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:'clamp(10px,2vw,24px)'
    }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-inner" style={{
        background:C.white,borderRadius:'clamp(14px,2vw,22px)',
        width:'100%',maxWidth:'clamp(300px,90vw,580px)',
        maxHeight:'clamp(500px,92vh,800px)',overflow:'auto',
        boxShadow:'0 40px 100px rgba(14,18,42,0.38), 0 0 0 1px rgba(43,56,112,0.07)',
        position:'relative',animation:'modalIn .4s cubic-bezier(0.34,1.4,0.64,1)',
        transformOrigin:'50% 60%'
      }}>
        <button onClick={onClose} style={{
          position:'absolute',top:16,right:16,background:'rgba(43,56,112,0.08)',border:'none',
          borderRadius:'50%',width:34,height:34,cursor:'pointer',fontSize:20,color:C.navy,
          display:'flex',alignItems:'center',justifyContent:'center',zIndex:10,
          transition:'background .15s'
        }}
          onMouseOver={e=>e.currentTarget.style.background='rgba(43,56,112,0.15)'}
          onMouseOut={e=>e.currentTarget.style.background='rgba(43,56,112,0.08)'}>×</button>

        {!showEmail ? (
          <div style={{padding:'clamp(24px,4vh,38px) clamp(20px,4vw,40px)'}}>
            <div style={{marginBottom:'clamp(18px,2.5vh,28px)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                <Logo height={28}/>
                <span style={{fontSize:'clamp(11px,0.9vw,13px)',color:C.muted,fontWeight:500}}>Étape {step+1} / {total}</span>
              </div>
              <div style={{height:3,background:C.creamDk,borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',background:`linear-gradient(90deg,${C.green},${C.greenLt})`,width:`${progress}%`,borderRadius:3,transition:'width .4s ease'}}/>
              </div>
            </div>
            <StepForm step={step} answers={answers} setAnswers={setAnswers}
              onNext={()=>step<total-1?setStep(s=>s+1):setShowEmail(true)}
              onPrev={()=>setStep(s=>Math.max(0,s-1))}
              isLast={step===total-1}/>
          </div>
        ) : (
          <EmailComposer answers={answers} onClose={onClose} onBack={()=>setShowEmail(false)}/>
        )}
      </div>
    </div>
  );
};

/* ── App ────────────────────────────── */
const App = () => {
  const [showModal, setShowModal] = useState(false);
  const [answers, setAnswers] = useState(()=>{
    try{return JSON.parse(localStorage.getItem('myrtine_ans')||'{}');}catch{return{};}
  });
  useEffect(()=>{ 
    try {
      const data = JSON.stringify(answers);
      // Limite 50KB pour éviter de saturer localStorage
      if (data.length < 50000) localStorage.setItem('myrtine_ans', data);
    } catch{}
  },[answers]);

  // Anti-bot: block right-click, drag, copy shortcuts
  useEffect(()=>{
    const noCtxMenu = e => e.preventDefault();
    const noDrag = e => e.preventDefault();
    const noCopy = e => { if(e.ctrlKey && ['a','c','u','s'].includes(e.key.toLowerCase())) e.preventDefault(); };
    document.addEventListener('contextmenu', noCtxMenu);
    document.addEventListener('dragstart', noDrag);
    document.addEventListener('keydown', noCopy);
    return ()=>{
      document.removeEventListener('contextmenu', noCtxMenu);
      document.removeEventListener('dragstart', noDrag);
      document.removeEventListener('keydown', noCopy);
    };
  }, []);

  return (
    <>
      <style>{`
        @keyframes floatBlob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.04)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
        @keyframes modalIn{from{opacity:0;transform:perspective(900px) translateY(36px) rotateX(7deg) scale(.95)}to{opacity:1;transform:perspective(900px) translateY(0) rotateX(0) scale(1)}}
        @keyframes ripple{to{transform:scale(4);opacity:0}}
        @keyframes slideIn{from{opacity:0;transform:translateY(18px) rotateX(3deg)}to{opacity:1;transform:translateY(0) rotateX(0)}}
      `}</style>
      <Nav onCTA={()=>setShowModal(true)}/>
      <Hero onCTA={()=>setShowModal(true)}/>
      <HowItWorks onCTA={()=>setShowModal(true)}/>
      <WhyMyrtine/>
      <CTABanner onCTA={()=>setShowModal(true)}/>
      <Footer/>
      {showModal&&<Modal onClose={()=>setShowModal(false)} answers={answers} setAnswers={setAnswers}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
